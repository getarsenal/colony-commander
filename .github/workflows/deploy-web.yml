name: Deploy Web build to GitHub Pages

# Builds the Godot 4.3 HTML5 export and publishes it to GitHub Pages so the
# prototype is playable on a phone (the target platform) straight from a URL.
# The export preset disables thread support, so the build runs on Pages without
# the cross-origin-isolation (COOP/COEP) headers Pages can't send.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the Pages deploy scopes.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish (don't cancel mid-publish).
concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.3-stable

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot ${{ env.GODOT_VERSION }} + export templates
        run: |
          set -euo pipefail
          base="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}"
          curl -fsSL -o godot.zip "${base}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          curl -fsSL -o templates.tpz "${base}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          unzip -q godot.zip
          chmod +x "Godot_v${GODOT_VERSION}_linux.x86_64"
          sudo mv "Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot
          # Templates must live under <version>.<status>, e.g. 4.3.stable
          tpl_dir="$HOME/.local/share/godot/export_templates/${GODOT_VERSION/-/.}"
          mkdir -p "$tpl_dir"
          unzip -q templates.tpz -d tpl
          mv tpl/templates/* "$tpl_dir/"
          godot --version

      - name: Import resources
        run: |
          # Generate the .godot import cache before exporting (fresh checkout has none).
          godot --headless --path . --editor --quit 2>&1 || true
          godot --headless --path . --editor --quit 2>&1 || true

      - name: Export Web build
        run: |
          set -euo pipefail
          mkdir -p build/web
          godot --headless --path . --export-release "Web" build/web/index.html
          test -f build/web/index.wasm
          ls -lh build/web

      - name: Cache-bust asset filenames
        run: |
          set -euo pipefail
          # Browsers cache index.pck / index.wasm by name, serving stale code after
          # a deploy. Give every build unique asset URLs (hash = commit sha) so a
          # fresh index.html always pulls the matching, uncached assets.
          cd build/web
          V="${GITHUB_SHA::8}"
          for f in index.js index.wasm index.pck index.audio.worklet.js index.png index.icon.png index.apple-touch-icon.png; do
            [ -f "$f" ] && mv "$f" "${f/index./index.$V.}"
          done
          # repoint every index.<ext> reference, then the engine's executable name
          sed -i "s|index\.|index.$V.|g" index.html
          sed -i "s|executable\":\"index\"|executable\":\"index.$V\"|" index.html
          test -f "index.$V.wasm" && test -f "index.$V.pck"
          ls -lh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Enable Pages (if not already)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
